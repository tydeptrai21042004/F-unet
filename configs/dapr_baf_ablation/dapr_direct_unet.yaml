experiment:
  output_root: outputs_fair
  name: dapr_direct_unet
data:
  root: data
  image_size: 352
  batch_size: 6
  num_workers: 4
  pin_memory: true
  augmentation: strong
train:
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  t_max: 30
  eta_min: 1.0e-06
  mixed_precision: false
  deterministic: true
  deterministic_warn_only: true
  grad_clip: 1.0
  seed: 42
  loss: bce_dice
  threshold: 0.5
  aux_loss_weight: 0.0
  aux_warmup_epochs: 0
  aux_ramp_epochs: 0
  save_metric: dice
  save_metric_mode: max
  use_aux_outputs_loss: false
  use_boundary_loss: false
  gradient_accumulation_steps: 1
eval:
  loss: bce_dice
  threshold: 0.5
  device: null
model:
  name: dapr_direct_unet
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  fourier_alpha: 0.5
  fourier_alpha_start: 0.5
  fourier_alpha_warmup_epochs: 0
  fourier_expansion: 1.5
  fourier_dropout: 0.1
  fourier_block_norm: gn
  fourier_block_act: gelu
  fourier_init_hw:
  - 22
  - 22
  fourier_amplitude_scale: 1.0
  fourier_phase_max: 3.141592653589793
  fourier_use_amplitude: true
  fourier_use_phase: true
  fourier_use_channel_mixing: true
  fourier_residual: false
  fourier_zero_init_output: false
  norm: bn
  act: relu
  decoder_use_cbam: false
  baf_enabled: false
  baf_window_size: 16
  baf_stride: 8
  baf_expansion: 1.0
  baf_amplitude_scale: 0.2
  baf_highpass_start: 0.2
  baf_dropout: 0.05
  baf_beta_max: 0.25
  baf_beta_init: 0.02
  baf_routing_floor: 0.05
  baf_use_boundary: true
  baf_detach_boundary: false
  baf_use_channel_mixing: true
  baf_warmup_epochs: 0
  baf_window_chunk_size: 256
ablation:
  group: proposal_iii
  description: Direct global amplitude--phase reconstruction without local refinement.
